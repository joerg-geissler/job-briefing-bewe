name: Job Briefing – Tägliche Auswertung

on:
  schedule:
    # 07:00 Uhr MEZ / 08:00 Uhr MESZ (UTC+1/+2 -> 06:00 UTC)
    - cron: '0 6 * * 1-5'   # Mo-Fr
  workflow_dispatch:         # manueller Start jederzeit moeglich

jobs:
  daily-briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # fuer git commit + push

    steps:
      # ── 1. Repo auschecken ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python einrichten ────────────────────────────────────────────
      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements_cloud.txt

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements_cloud.txt

      # ── 3. E-Mails via Graph API holen ──────────────────────────────────
      - name: E-Mails abrufen (Microsoft Graph API)
        env:
          AZURE_TENANT_ID:    ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:    ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          OUTLOOK_USER:       ${{ secrets.OUTLOOK_USER }}
        run: python fetch_emails.py

      # ── 4. Stellen extrahieren und bewerten (Claude API) ────────────────
      - name: Stellen extrahieren und bewerten (Claude Haiku)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python extract_jobs.py

      # ── 5. index.html generieren ────────────────────────────────────────
      - name: Dashboard-HTML generieren (generate.py)
        run: python generate.py

      # ── 6. Ergebnisse committen und pushen ──────────────────────────────
      - name: Aenderungen committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs_dashboard.json index.html
          git diff --staged --quiet && echo "Keine Aenderungen." || \
            git commit -m "auto-update $(date +%Y-%m-%d)"
          git push

      # ── 7. Telegram-Benachrichtigung senden ─────────────────────────────
      - name: Telegram-Benachrichtigung senden
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_telegram_cloud.py
